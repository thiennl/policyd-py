; policyd-py full config template
; Mục tiêu: file “chờ” để điền dần từng phần trước khi đưa vào production.
; Khuyến nghị: copy file này thành /etc/policyd/config.ini rồi sửa giá trị thật.

[General]
; Unix socket cho Postfix check_policy_service
socket = /var/run/gopolicyd.sock
; Quyền trên socket. 0660 hoặc 0666 tùy user/group chạy Postfix và policyd-py.
socket_permission = 0660
; Chỉ bật debug khi cần điều tra sự cố
debug = false
; Số worker logic. 200-400 phù hợp single-node vừa; benchmark trước khi tăng thêm.
worker_count = 300
; Timeout đọc/ghi trên mỗi policy connection
client_read_timeout = 10
client_write_timeout = 10

[Actions]
; Action trả về cho Postfix
success_action = DUNNO
fail_action = DEFER
db_error_action = DUNNO

[KeyDB]
; Backend Redis/KeyDB. Hỗ trợ 1 endpoint chủ động trong runtime hiện tại.
hosts = 127.0.0.1:6379
password =
db = 0
cluster_mode = false
connect_timeout = 2
read_timeout = 1
write_timeout = 1

[Locks]
; TTL lock mặc định nếu không có progressive penalty override
lock_duration = 600
; Chưa dùng trực tiếp trong hot path, nhưng nên giữ mặc định an toàn
unlock_ttl_threshold = 11

[Penalty]
; Progressive penalty cho account vượt ngưỡng lặp lại
enable = true
ttl = 1d
steps = 10m,30m,2h

[Limits]
; Cờ bật/tắt toàn bộ policy daemon
enable_policyd = true
; Nên giữ RCPT cho Postfix policy delegation
policy_check_state = RCPT
; Phải bật để đạt throughput tốt
ratelimit_use_lua = true
; Quota mặc định áp cho request không match policy riêng
default_quota = 100/1h:fixed_window,30/5m:sliding_window_counter

[DomainLists]
; Local domain nội bộ
local_domains = example.com,internal.example
; Có thể load từ file: file:///etc/policyd/local_domains.txt
; Có thể load từ LDAP: ldap://ldap.example.com/dc=example,dc=com
ldap_domains = ldap://ldap.example.com/dc=example,dc=com

[AccountLists]
vip_accounts = ceo@example.com,cfo@example.com

[IPLists]
trusted_relays = 10.0.0.0/24,192.168.1.10

[AdaptiveLimits]
; Adaptive limit nên bật khi list trusted đã rõ ràng
enable = true
authenticated_multiplier = 1.5
unauthenticated_multiplier = 0.5
local_sender_multiplier = 1.25
external_sender_multiplier = 0.75
trusted_multiplier = 2.0
trusted_account_lists = vip_accounts
trusted_domain_lists = local_domains
trusted_ip_lists = trusted_relays
minimum_multiplier = 0.5
maximum_multiplier = 3.0

[Quotas]
internal_quota = 500/1h:fixed_window
external_quota = 150/1h:fixed_window
vip_quota = unlimited

[Policies]
; format: sender_match:recipient_match:quota_name
vip_internal = @vip_accounts:@local_domains:vip_quota
internal_to_internal = @local_domains:@local_domains:internal_quota
internal_to_external = @local_domains:*:external_quota

[EmailValidation]
; monitor_only=true để quan sát trước khi enforce
monitor_only = false
dns_timeout = 10
allow_smtputf8 = true
allow_quoted_local = false
allow_domain_literal = false
validate_sender_syntax = true
enable_blacklist = true
validate_recipient_syntax = true
; Không bật trong production throughput cao nếu chưa chứng minh DNS ổn định
validate_recipient_deliverability = false
validate_recipient = true
blacklist_auto_reload = true
blacklist_reload_interval = 300
sender_blacklist_file = /etc/policyd/blacklist_sender.txt
recipient_blacklist_file = /etc/policyd/blacklist_recipient.txt
domain_blacklist_file = /etc/policyd/blacklist_domain.txt

[ExternalAction]
; Lock/unlock/status chỉ dùng external provider
enable = true
; script hoặc webhook
provider = script
; fallback có thể để webhook hoặc script tùy primary
fallback_providers = webhook
continue_on_error = false
; Nên bật nếu script/webhook có thể chậm hoặc tỷ lệ exceed cao
async_execution = true
async_queue_size = 5000
async_workers = 32

[Webhook]
; Chỉ dùng nếu provider=webhook hoặc làm fallback
lock_url = https://hooks.example.com/lock
unlock_url = https://hooks.example.com/unlock
status_url =
lock_method = POST
unlock_method = POST
status_method = GET
lock_body = {"email":"${email}","reason":"${reason}","timestamp":"${timestamp}"}
unlock_body = {"email":"${email}","timestamp":"${timestamp}"}
status_field = status
auth_type = bearer
auth_token = CHANGE_ME
auth_user =
auth_pass =
headers = X-Source:policyd-py
sign_requests = false
sign_secret =
sign_header = X-Webhook-Signature
timeout_seconds = 5
retry_count = 2
retry_delay_seconds = 1

[Script]
; Variables: ${action} ${email} ${reason} ${event} ${message} ${duration_seconds} ${timestamp}
lock_command = /opt/policyd/scripts/account_action.sh lock ${email} ${reason}
unlock_command = /opt/policyd/scripts/account_action.sh unlock ${email}
status_command = /opt/policyd/scripts/account_action.sh status ${email}
notify_command = /opt/policyd/scripts/notify_action.sh ${event} ${email} ${message}
timeout_seconds = 5

[LDAP]
; Chỉ cần khi dùng list từ LDAP
host = ldap.example.com
port = 389
use_ssl = false
bind_dn = cn=readonly,dc=example,dc=com
bind_password = CHANGE_ME
base_dn = dc=example,dc=com
search_filter = (associatedDomain=*)
domain_attribute = associatedDomain
timeout = 10
refresh_interval = 60

[Telegram]
enable = false
bot_token =
chat_id =

[Discord]
enable = false
bot_token =
channel_id =
message_template = [policyd] {message} ({timestamp})

[Email]
enable = false
smtp_host = smtp.example.com
smtp_port = 587
smtp_user = monitor@example.com
smtp_password = CHANGE_ME
from = monitor@example.com
from_display_name = Policyd Monitor
to = soc@example.com,mailops@example.com
subject = Policyd Alert
template = {message}

[Logging]
; Để trống nếu log qua stdout/journalctl
log_file =
level = info

[Web]
; Management API nội bộ. Không public trực tiếp ra Internet.
enable = false
host = 127.0.0.1
port = 8080
username = admin
password =
bearer_token =
cors_enabled = false
cors_origins = *
